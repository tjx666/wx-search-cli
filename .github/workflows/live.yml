name: Live

on:
  schedule:
    # daily canary against real Sogou to catch upstream page changes
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # may fail because Sogou rate-limits datacenter IPs, not because the
      # code broke — check the assertion message before reacting
      - run: bun run test:live
